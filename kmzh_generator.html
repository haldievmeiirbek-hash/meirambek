<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ҚМЖ Жасаушы</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --accent: #2D5016;
    --accent2: #4A7C2F;
    --accent-light: #E8F2E0;
    --text: #1A1A1A;
    --text2: #5A5A5A;
    --text3: #8A8A8A;
    --border: #D8D4CC;
    --border2: #C5BFB5;
    --red: #C0392B;
    --gold: #B8860B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  header .sub {
    font-size: 0.8rem;
    opacity: 0.75;
    font-weight: 300;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    align-items: start;
  }
  @media (max-width: 700px) {
    .container { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .panel-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .panel-header .icon {
    width: 28px; height: 28px;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .panel-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--accent);
  }
  .panel-body { padding: 1.25rem; }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.35rem;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(74,124,47,0.15);
    background: white;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
  .btn-generate {
    width: 100%;
    padding: 0.85rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .btn-generate:hover { background: var(--accent2); }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
  .result-panel {
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: none;
  }
  .result-panel.show { display: block; }
  .result-header {
    background: var(--accent);
    color: white;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .result-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 500;
  }
  .result-actions { display: flex; gap: 0.5rem; }
  .btn-sm {
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.15);
    color: white;
    transition: background 0.2s;
  }
  .btn-sm:hover { background: rgba(255,255,255,0.25); }
  .result-content {
    padding: 1.5rem;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
    min-height: 200px;
  }
  .result-content .kmzh-section {
    margin-bottom: 1.2rem;
  }
  .result-content .section-title {
    font-weight: 600;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--accent);
    border-bottom: 1px solid var(--accent-light);
    padding-bottom: 0.3rem;
    margin-bottom: 0.5rem;
  }
  .result-content table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin-top: 0.5rem;
  }
  .result-content table th {
    background: var(--accent-light);
    color: var(--accent);
    padding: 0.5rem 0.75rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .result-content table td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .result-content table tr:last-child td { border-bottom: none; }
  .result-content table tr:nth-child(even) td { background: var(--bg); }
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 3rem;
    color: var(--text2);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--accent-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    padding: 1rem;
    background: #FEE;
    border: 1px solid #FCC;
    border-radius: 8px;
    color: var(--red);
    font-size: 0.85rem;
    margin: 1rem 1.5rem;
    display: none;
  }
  .error-msg.show { display: block; }
  .tag {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .watermark {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text3);
    padding: 1.5rem;
    border-top: 1px solid var(--border);
  }
  @media print {
    header, .container > .panel:not(.result-panel), .result-header .result-actions, .watermark { display: none; }
    .result-panel { border: none; display: block !important; }
    .result-content { padding: 0; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">ҚМЖ Жасаушы</div>
    <div class="sub">Қысқа мерзімді жоспар генераторы · AI негізінде</div>
  </div>
</header>

<div class="container">

  <!-- LEFT PANEL: Сабақ мәліметтері -->
  <div class="panel">
    <div class="panel-header">
      <div class="icon">📋</div>
      <h2>Сабақ мәліметтері</h2>
    </div>
    <div class="panel-body">
      <div class="row2">
        <div class="field">
          <label>Пән</label>
          <input type="text" id="subject" placeholder="Математика, Қазақ тілі..." />
        </div>
        <div class="field">
          <label>Сынып</label>
          <select id="grade">
            <option value="">Таңдаңыз</option>
            <option>1-сынып</option><option>2-сынып</option><option>3-сынып</option>
            <option>4-сынып</option><option>5-сынып</option><option>6-сынып</option>
            <option>7-сынып</option><option>8-сынып</option><option>9-сынып</option>
            <option>10-сынып</option><option>11-сынып</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Тақырып</label>
        <input type="text" id="topic" placeholder="Сабақтың тақырыбын жазыңыз..." />
      </div>
      <div class="row2">
        <div class="field">
          <label>Сабақ уақыты</label>
          <select id="duration">
            <option>45 минут</option>
            <option>40 минут</option>
            <option>80 минут</option>
          </select>
        </div>
        <div class="field">
          <label>Оқушы саны</label>
          <input type="number" id="students" placeholder="25" min="1" max="50" />
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Күні</label>
          <input type="date" id="date" />
        </div>
        <div class="field">
          <label>Тоқсан / Апта</label>
          <input type="text" id="quarter" placeholder="1-тоқсан, 3-апта" />
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL: Мақсаттар мен ресурстар -->
  <div class="panel">
    <div class="panel-header">
      <div class="icon">🎯</div>
      <h2>Мақсаттар мен ресурстар</h2>
    </div>
    <div class="panel-body">
      <div class="field">
        <label>Оқу мақсаттары (нені үйренеді?)</label>
        <textarea id="objectives" placeholder="Оқушылар... үйренеді / біледі / түсінеді..."></textarea>
      </div>
      <div class="field">
        <label>Сабақ түрі</label>
        <select id="lessonType">
          <option>Жаңа тақырып</option>
          <option>Бекіту сабағы</option>
          <option>Қайталау сабағы</option>
          <option>Тексеру сабағы</option>
          <option>Аралас сабақ</option>
        </select>
      </div>
      <div class="field">
        <label>Құрал-жабдықтар / Ресурстар</label>
        <input type="text" id="resources" placeholder="Оқулық, интерактивті тақта, карточкалар..." />
      </div>
      <div class="field">
        <label>Ерекше ескертулер (міндетті емес)</label>
        <textarea id="notes" placeholder="Ерекше қажеттіліктер, топтар, дифференциация..." style="min-height:60px;"></textarea>
      </div>
      <button class="btn-generate" id="generateBtn" onclick="generateKMZh()">
        ✨ ҚМЖ Жасау
      </button>
    </div>
  </div>

  <!-- RESULT PANEL -->
  <div class="panel result-panel" id="resultPanel">
    <div class="result-header">
      <h2>📄 Қысқа Мерзімді Жоспар</h2>
      <div class="result-actions">
        <button class="btn-sm" onclick="copyResult()">📋 Көшіру</button>
        <button class="btn-sm" onclick="window.print()">🖨️ Басып шығару</button>
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="result-content" id="resultContent">
      <div class="loading" id="loadingDiv" style="display:none;">
        <div class="spinner"></div>
        <span>ҚМЖ жасалуда, күте тұрыңыз...</span>
      </div>
    </div>
    <div class="watermark">ҚМЖ Жасаушы · AI негізінде автоматты жасалды</div>
  </div>

</div>

<script>
const API_KEY_PLACEHOLDER = "";

async function generateKMZh() {
  const subject = document.getElementById('subject').value.trim();
  const grade = document.getElementById('grade').value;
  const topic = document.getElementById('topic').value.trim();
  const duration = document.getElementById('duration').value;
  const students = document.getElementById('students').value;
  const date = document.getElementById('date').value;
  const quarter = document.getElementById('quarter').value.trim();
  const objectives = document.getElementById('objectives').value.trim();
  const lessonType = document.getElementById('lessonType').value;
  const resources = document.getElementById('resources').value.trim();
  const notes = document.getElementById('notes').value.trim();

  if (!subject || !grade || !topic) {
    showError('Пән, сынып және тақырыпты міндетті түрде толтырыңыз!');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Жасалуда...';

  const resultPanel = document.getElementById('resultPanel');
  resultPanel.classList.add('show');
  resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const resultContent = document.getElementById('resultContent');
  const loadingDiv = document.getElementById('loadingDiv');
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.classList.remove('show');
  loadingDiv.style.display = 'flex';
  resultContent.innerHTML = '';
  resultContent.appendChild(loadingDiv);
  loadingDiv.style.display = 'flex';

  const prompt = `Сен тәжірибелі қазақстандық мұғалімсің. Төмендегі мәліметтер негізінде толық және кәсіби ҚМЖ (Қысқа мерзімді жоспар) жаса.

Мәліметтер:
- Пән: ${subject}
- Сынып: ${grade}
- Тақырып: ${topic}
- Сабақ уақыты: ${duration}
- Оқушы саны: ${students || 'белгісіз'}
- Күні: ${date || 'белгісіз'}
- Тоқсан/Апта: ${quarter || 'белгісіз'}
- Сабақ мақсаты: ${objectives || 'жалпы тақырып бойынша'}
- Сабақ түрі: ${lessonType}
- Құралдар: ${resources || 'стандартты'}
- Ескертулер: ${notes || 'жоқ'}

ТОЛ ФОРМАТТА ҚМЖ жаса. Міндетті бөлімдер:

1. ЖАЛПЫ МӘЛІМЕТТЕР (кесте түрінде)
2. ОҚУ МАҚСАТТАРЫ (SMART форматта)
3. ТАБЫС КРИТЕРИЙЛЕРІ (3 деңгей: жеткілікті, орташа, жоғары)
4. САБАҚТЫҢ КЕЗЕҢДЕРІ (уақытпен бірге кесте):
   - Ұйымдастыру / Тіл серпіні (бастама)
   - Үй тапсырмасын тексеру
   - Жаңа тақырып / Негізгі бөлім
   - Бекіту / Практика
   - Бағалау
   - Қорытынды / Рефлексия
5. ДИФФЕРЕНЦИАЦИЯ (АКТ, Дарынды, Қолдау қажет)
6. БАҒАЛАУ ТӘСІЛІ
7. МҰҒАЛІМНІҢ РЕФЛЕКСИЯСЫ (бос орын)

Қазақ тілінде жаз. Нақты, практикалық, іс жүзінде қолдануға дайын болсын. HTML форматында қайтар — тек <div>, <table>, <p>, <ul>, <li>, <strong>, <em> тегтерін ғана пайда. Ешқандай markdown, ешқандай \`\`\`html блогы болмасын. Тікелей HTML тегтерінен бастасын.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 3000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API қатесі');
    }

    const data = await response.json();
    const html = data.content?.map(b => b.type === 'text' ? b.text : '').join('') || '';

    loadingDiv.style.display = 'none';
    resultContent.innerHTML = formatKMZh(html);

  } catch (err) {
    loadingDiv.style.display = 'none';
    showError('Қате: ' + err.message + '. Интернет байланысын немесе API кілтін тексеріңіз.');
  }

  btn.disabled = false;
  btn.innerHTML = '✨ ҚМЖ Жасау';
}

function formatKMZh(raw) {
  let cleaned = raw.trim();
  cleaned = cleaned.replace(/```html|```/g, '').trim();

  if (!cleaned.includes('<')) {
    cleaned = cleaned
      .replace(/^#{1,3}\s+(.+)$/gm, '<div class="section-title">$1</div>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');
    cleaned = '<p>' + cleaned + '</p>';
  }

  cleaned = cleaned
    .replace(/<table/g, '<table style="width:100%;border-collapse:collapse;margin:0.5rem 0;font-size:0.85rem;"')
    .replace(/<th/g, '<th style="background:#E8F2E0;color:#2D5016;padding:0.5rem 0.75rem;text-align:left;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.05em;"')
    .replace(/<td/g, '<td style="padding:0.5rem 0.75rem;border-bottom:1px solid #D8D4CC;vertical-align:top;"');

  return cleaned;
}

function showError(msg) {
  const e = document.getElementById('errorMsg');
  e.textContent = msg;
  e.classList.add('show');
  document.getElementById('resultPanel').classList.add('show');
}

async function copyResult() {
  const content = document.getElementById('resultContent');
  const text = content.innerText;
  try {
    await navigator.clipboard.writeText(text);
    const btn = event.target;
    btn.textContent = '✅ Көшірілді!';
    setTimeout(() => btn.textContent = '📋 Көшіру', 2000);
  } catch(e) {
    alert('Көшіру мүмкін болмады. Қолмен таңдаңыз.');
  }
}

document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
